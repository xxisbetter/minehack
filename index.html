<!DOCTYPE html>

<head>

    <style>

            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--main-red); text-align: center; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #222;
            border: 2px solid var(--main-red);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }

        .card:hover { transform: scale(1.03); }

        .download-btn {
            display: inline-block;
            background-color: var(--main-red);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }

        .download-btn:hover { background-color: var(--dark-red); }

        .footer-tag {
            font-size: 10px;
            color: #777;
            margin-top: 15px;
            border-top: 1px solid #333;
            padding-top: 5px;
        }

        .pagination {
            text-align: center;
            margin-top: 30px;
        }

        .page-link {
            color: white;
            background: var(--main-red);
            padding: 8px 16px;
            text-decoration: none;
            margin: 5px;
            border-radius: 4px;
        }
    </style>
</head>
